name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o dist/l-connect3-cli.exe .
          Copy-Item dist/l-connect3-cli.exe dist/l-connect3-cli-${{ github.ref_name }}-windows-amd64.exe

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/l-connect3-cli.exe
            dist/l-connect3-cli-${{ github.ref_name }}-windows-amd64.exe
